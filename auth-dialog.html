<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <script src="https://alcdn.msauth.net/browser/2.38.0/js/msal-browser.min.js"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #f5f5f5;
    }
    .container {
      text-align: center;
      padding: 40px;
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      max-width: 400px;
    }
    .spinner {
      width: 40px;
      height: 40px;
      margin: 20px auto;
      border: 4px solid #f3f3f3;
      border-top: 4px solid #4472C4;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .error {
      color: #d32f2f;
      margin-top: 20px;
      padding: 12px;
      background: #ffebee;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Signing in...</h2>
    <div class="spinner"></div>
    <p id="status">Authenticating with Microsoft</p>
    <div id="error" class="error" style="display: none;"></div>
  </div>

  <script>
    const AUTH_CONFIG = {
      clientId: "19c2f55b-db3c-44c0-9ca6-1fd91f8a2c5c",
      tenantId: "dbd0413f-9515-4bd1-945a-1948b655558b",
      redirectUri: window.location.origin + "/auth-dialog.html",
      apiScope: "api://19c2f55b-db3c-44c0-9ca6-1fd91f8a2c5c/Icons.Read",
    };

    const msalConfig = {
      auth: {
        clientId: AUTH_CONFIG.clientId,
        authority: `https://login.microsoftonline.com/${AUTH_CONFIG.tenantId}`,
        redirectUri: AUTH_CONFIG.redirectUri,
      },
      cache: {
        cacheLocation: "sessionStorage",
        storeAuthStateInCookie: true,
      },
    };

    let msalInstance = null;

    function updateStatus(msg) {
      document.getElementById('status').textContent = msg;
      console.log("[Auth Dialog]", msg);
    }

    function showError(msg) {
      const errorEl = document.getElementById('error');
      errorEl.textContent = msg;
      errorEl.style.display = 'block';
      document.querySelector('.spinner').style.display = 'none';
    }

    async function handleRedirectResponse() {
      try {
        updateStatus("Processing authentication...");

        msalInstance = new msal.PublicClientApplication(msalConfig);
        await msalInstance.initialize();

        // Handle redirect response
        const response = await msalInstance.handleRedirectPromise();

        if (response) {
          // Successfully authenticated via redirect
          updateStatus("Getting access token...");
          console.log("[Auth Dialog] Login successful, getting token");

          const tokenResult = await msalInstance.acquireTokenSilent({
            scopes: [AUTH_CONFIG.apiScope],
            account: response.account,
          });

          updateStatus("Sign-in successful!");

          // Send token back to taskpane
          const message = JSON.stringify({
            status: "success",
            token: tokenResult.accessToken,
            account: {
              username: response.account.username,
              name: response.account.name,
            }
          });

          console.log("[Auth Dialog] Sending success message to parent");

          // Use messageParent to send to taskpane
          if (window.opener && window.opener.Office) {
            // For popup mode
            window.opener.postMessage(message, window.location.origin);
            window.close();
          } else if (Office && Office.context && Office.context.ui) {
            // For Office Dialog
            Office.context.ui.messageParent(message);
          } else {
            // Fallback
            window.parent.postMessage(message, "*");
          }

        } else {
          // No response - need to initiate login
          console.log("[Auth Dialog] No redirect response, starting login redirect");
          updateStatus("Redirecting to sign-in...");

          await msalInstance.loginRedirect({
            scopes: [AUTH_CONFIG.apiScope],
            prompt: "select_account",
          });
        }

      } catch (error) {
        console.error("[Auth Dialog] Error:", error);
        showError(error.message || "Authentication failed");

        const message = JSON.stringify({
          status: "error",
          error: error.message || "Authentication failed"
        });

        // Try all methods to send error
        try {
          if (window.opener) {
            window.opener.postMessage(message, window.location.origin);
            window.close();
          } else if (Office && Office.context && Office.context.ui) {
            Office.context.ui.messageParent(message);
          } else {
            window.parent.postMessage(message, "*");
          }
        } catch (sendError) {
          console.error("[Auth Dialog] Failed to send error:", sendError);
        }
      }
    }

    // Start authentication when page loads
    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", handleRedirectResponse);
    } else {
      handleRedirectResponse();
    }
  </script>
</body>
</html>
