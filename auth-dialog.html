<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <script src="https://alcdn.msauth.net/browser/2.38.0/js/msal-browser.min.js"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #f5f5f5;
    }
    .container {
      text-align: center;
      padding: 40px;
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      max-width: 400px;
    }
    .spinner {
      width: 40px;
      height: 40px;
      margin: 20px auto;
      border: 4px solid #f3f3f3;
      border-top: 4px solid #4472C4;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .error {
      color: #d32f2f;
      margin-top: 20px;
      padding: 12px;
      background: #ffebee;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Signing in...</h2>
    <div class="spinner"></div>
    <p id="status" style="display: none;">Authenticating with Microsoft</p>
    <div id="error" class="error" style="display: none;"></div>
    <div id="debug" style="display: none; margin-top: 20px; font-size: 12px; color: #666; text-align: left; max-height: 200px; overflow-y: auto;"></div>
    <button id="close-btn" style="display: none; margin-top: 20px; padding: 10px 20px; background: #4472C4; color: white; border: none; border-radius: 4px; cursor: pointer;">Close Window</button>
  </div>

  <script>
    const AUTH_CONFIG = {
      clientId: "19c2f55b-db3c-44c0-9ca6-1fd91f8a2c5c",
      tenantId: "dbd0413f-9515-4bd1-945a-1948b655558b",
      redirectUri: window.location.origin + "/auth-dialog.html",
      apiScope: "api://19c2f55b-db3c-44c0-9ca6-1fd91f8a2c5c/Icons.Read",
    };

    const msalConfig = {
      auth: {
        clientId: AUTH_CONFIG.clientId,
        authority: `https://login.microsoftonline.com/${AUTH_CONFIG.tenantId}`,
        redirectUri: AUTH_CONFIG.redirectUri,
      },
      cache: {
        cacheLocation: "localStorage", // Use localStorage to persist across windows
        storeAuthStateInCookie: true,
      },
    };

    let msalInstance = null;

    function addDebugLog(msg) {
      const debugEl = document.getElementById('debug');
      const time = new Date().toLocaleTimeString();
      debugEl.innerHTML += `<div>[${time}] ${msg}</div>`;
      debugEl.scrollTop = debugEl.scrollHeight;
      console.log("[Auth Dialog]", msg);
    }

    function updateStatus(msg) {
      document.getElementById('status').textContent = msg;
      addDebugLog(msg);
    }

    function showError(msg) {
      const errorEl = document.getElementById('error');
      errorEl.textContent = msg;
      errorEl.style.display = 'block';
      document.querySelector('.spinner').style.display = 'none';
      addDebugLog('ERROR: ' + msg);

      // Show manual close button on error
      document.getElementById('close-btn').style.display = 'block';
    }

    function showCloseButton() {
      document.querySelector('.spinner').style.display = 'none';
      document.getElementById('close-btn').style.display = 'block';
      document.getElementById('close-btn').onclick = () => {
        addDebugLog('Manual close button clicked');
        window.close();
      };
    }

    let officeReady = false;

    // Initialize Office.js first
    Office.onReady(() => {
      console.log("[Auth Dialog] Office.js is ready");
      officeReady = true;
    });

    async function sendMessageToParent(message) {
      const messageStr = typeof message === 'string' ? message : JSON.stringify(message);

      addDebugLog("Attempting to send message to parent");

      // Wait for Office.js to be ready
      let attempts = 0;
      while (!officeReady && attempts < 50) {
        await new Promise(resolve => setTimeout(resolve, 100));
        attempts++;
        if (attempts % 10 === 0) {
          addDebugLog(`Waiting for Office.js... (${attempts * 100}ms)`);
        }
      }

      if (!officeReady) {
        addDebugLog("WARNING: Office.js not ready after 5 seconds, trying anyway");
      } else {
        addDebugLog("Office.js is ready");
      }

      let messageSent = false;

      // Try Office Dialog messageParent (most reliable)
      try {
        if (Office && Office.context && Office.context.ui && Office.context.ui.messageParent) {
          addDebugLog("Sending via Office.context.ui.messageParent");
          Office.context.ui.messageParent(messageStr);
          messageSent = true;
          addDebugLog("✓ Message sent successfully");

          // Show close button after sending
          setTimeout(() => {
            addDebugLog("Dialog should have closed. Showing manual close button.");
            showCloseButton();
          }, 2000);
          return;
        } else {
          addDebugLog("Office.context.ui.messageParent not available");
        }
      } catch (err) {
        addDebugLog("messageParent failed: " + err.message);
      }

      // Fallback: postMessage to opener
      try {
        if (window.opener) {
          addDebugLog("Sending via window.opener.postMessage");
          window.opener.postMessage(messageStr, window.location.origin);
          messageSent = true;
          addDebugLog("✓ Message sent to opener");
          setTimeout(() => {
            addDebugLog("Closing window...");
            window.close();
          }, 500);
          return;
        }
      } catch (err) {
        addDebugLog("opener.postMessage failed: " + err.message);
      }

      // Last resort: postMessage to parent
      try {
        addDebugLog("Sending via window.parent.postMessage");
        window.parent.postMessage(messageStr, window.location.origin);
        messageSent = true;
        addDebugLog("✓ Message sent to parent");
      } catch (err) {
        addDebugLog("parent.postMessage failed: " + err.message);
      }

      if (!messageSent) {
        addDebugLog("❌ Failed to send message via any method");
        showError("Could not communicate with add-in. Please close this window manually.");
      } else {
        // Show manual close button as backup
        setTimeout(() => {
          addDebugLog("If window didn't close automatically, click button below");
          showCloseButton();
        }, 3000);
      }
    }

    async function handleRedirectResponse() {
      try {
        updateStatus("Processing authentication...");

        msalInstance = new msal.PublicClientApplication(msalConfig);
        await msalInstance.initialize();

        // Handle redirect response
        const response = await msalInstance.handleRedirectPromise();

        if (response) {
          // Successfully authenticated via redirect
          updateStatus("Getting access token...");
          console.log("[Auth Dialog] Login successful, getting token");

          const tokenResult = await msalInstance.acquireTokenSilent({
            scopes: [AUTH_CONFIG.apiScope],
            account: response.account,
          });

          updateStatus("Sign-in successful!");

          // Send token back to taskpane
          const message = {
            status: "success",
            token: tokenResult.accessToken,
            account: {
              username: response.account.username,
              name: response.account.name,
            }
          };

          console.log("[Auth Dialog] Sending success message to parent");
          await sendMessageToParent(message);

        } else {
          // No response - need to initiate login
          console.log("[Auth Dialog] No redirect response, starting login redirect");
          updateStatus("Redirecting to sign-in...");

          await msalInstance.loginRedirect({
            scopes: [AUTH_CONFIG.apiScope],
            prompt: "select_account",
          });
        }

      } catch (error) {
        console.error("[Auth Dialog] Error:", error);
        showError(error.message || "Authentication failed");

        const message = {
          status: "error",
          error: error.message || "Authentication failed"
        };

        await sendMessageToParent(message);
      }
    }

    // Start authentication when page loads
    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", handleRedirectResponse);
    } else {
      handleRedirectResponse();
    }
  </script>
</body>
</html>
